<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>黃瀞嫻生日快樂~</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-cancer" aria-hidden="true"></div>

  <main class="page">
    <h1 class="title">黃瀞嫻生日快樂~</h1>

    <section class="countdown" aria-live="polite">
      <p class="countdown-label" id="countdown-label">距離生日還有</p>
      <div class="countdown-grid" id="countdown-grid">
        <div class="unit">
          <span class="value" id="days">00</span>
          <span class="unit-label">天</span>
        </div>
        <div class="unit">
          <span class="value" id="hours">00</span>
          <span class="unit-label">時</span>
        </div>
        <div class="unit">
          <span class="value" id="mins">00</span>
          <span class="unit-label">分</span>
        </div>
        <div class="unit">
          <span class="value" id="secs">00</span>
          <span class="unit-label">秒</span>
        </div>
      </div>
      <p class="celebrate" id="celebrate" hidden>就是今天！</p>
    </section>

    <div class="cake-stage" aria-label="雙層芋頭生日蛋糕，蠟燭寫著十五">
      <div class="cake">
        <div class="candles">
          <div class="candle">
            <div class="flame">
              <span class="flame-outer"></span>
              <span class="flame-inner"></span>
              <span class="flame-core"></span>
            </div>
            <div class="wick"></div>
            <div class="stick">
              <span class="num">1</span>
            </div>
          </div>
          <div class="candle">
            <div class="flame flame-delay">
              <span class="flame-outer"></span>
              <span class="flame-inner"></span>
              <span class="flame-core"></span>
            </div>
            <div class="wick"></div>
            <div class="stick">
              <span class="num">5</span>
            </div>
          </div>
        </div>

        <div class="tier tier-top">
          <div class="frosting"></div>
          <div class="body"></div>
        </div>
        <div class="tier tier-bottom">
          <div class="frosting"></div>
          <div class="body"></div>
        </div>
        <div class="plate"></div>
      </div>
    </div>

    <section class="memory" id="memory" aria-label="生日記憶影片">
      <h2 class="memory-title">一塊記憶</h2>
      <div class="memory-frame">
        <video
          class="memory-video"
          src="memory.mp4"
          controls
          playsinline
          preload="metadata"
          muted
          loop
          autoplay
        ></video>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
